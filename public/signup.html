<!DOCTYPE html>
<html>
<head>
<title>Signup</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<style>
    /* Page background */

body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#142a4f,#214e96);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

/* Signup box */

.container{
background:rgba(255,255,255,0.92);
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
width:320px;
text-align:center;
}

/* Heading */

h2{
margin-bottom:20px;
}

/* Inputs */

input, select{
width:100%;
padding:10px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

/* Button */

button{
width:100%;
padding:10px;
background:#f59e0b;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0056b3;
}

/* Link */

a{
text-decoration:none;
color:#007bff;
font-size:14px;
}

a:hover{
text-decoration:underline;
}
</style>
<div class="container">
<h2>Signup</h2>

<input id="name" placeholder="Name"><br><br>

<input id="email" placeholder="Email"><br><br>

<input id="password" type="password" placeholder="Password"><br><br>

<select id="role">
<option value="citizen">Citizen</option>
<option value="officer">Officer</option>
<option value="admin">Admin</option>
</select>

<br><br>

<button onclick="signup()">Signup</button>

<br><br>

<a href="login.html">Already have an account? Login</a>
</div>
<script src="signup.js"></script>

</body>
</html>
