<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NagarSeva Login</title>

<link rel="stylesheet" href="login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<div class="container">

<!-- LEFT SIDE -->

<div class="left">

<h2 class="logo">
<i class="fa-solid fa-shield"></i> NagarSeva
</h2>

<h1>Your Gateway to Better<br>Urban Governance</h1>

<p>
Access all civic services from one portal. File complaints,
track resolutions, and connect with government departments.
</p>

</div>


<!-- LOGIN CARD -->

<div class="login-card">

<h2>Sign In</h2>
<p class="sub">Choose your role and sign in to continue</p>

<div class="roles">

<button class="role active" data-role="user">👤 Citizen</button>
<button class="role" data-role="officer">📋 Officer</button>
<button class="role" data-role="admin">🛡 Admin</button>

</div>

<label>Email</label>
<input id="email" type="email" placeholder="demo@citizen.gov">

<label>Password</label>
<input id="password" type="password" placeholder="Enter password">
<a href="citizen_dashboard.html">
<button id="loginBtn" class="login-btn">
Sign In
</button></a>

<p class="demo">
Demo mode — any credentials will work
</p>

</div>

</div>

<script src="login.js"></script>

</body>
</html>
