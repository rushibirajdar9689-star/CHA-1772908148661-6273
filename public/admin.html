<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NagarSeva Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
display:flex;
background:#f4f6fb;
color:#333;
}

/* Sidebar */

.sidebar{
width:240px;
background:#0f2747;
color:white;
height:100vh;
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:20px;
font-weight:bold;
margin-bottom:30px;
}

.nav a{
display:block;
padding:12px;
margin-bottom:8px;
border-radius:8px;
text-decoration:none;
color:white;
transition:0.3s;
}

.nav a:hover{
background:#1f3d66;
transform:translateX(6px);
}

.logout{
margin-top:auto;
opacity:.7;
}

/* Main */

.main{
flex:1;
padding:30px;
}

.header{
font-size:26px;
font-weight:600;
margin-bottom:20px;
}

/* Cards */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.06);
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 12px 25px rgba(0,0,0,0.15);
}

.card h3{
font-size:14px;
color:#777;
margin-bottom:10px;
}

.card .number{
font-size:30px;
font-weight:bold;
}

/* Charts */

.charts{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
}

.chart-box{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 6px 15px rgba(0,0,0,0.06);
animation:fadeIn 1s ease;
}

/* Animations */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<div class="logo">NagarSeva</div>

<div class="nav">
<a href="">Dashboard</a>
<a href="#">All Complaints</a>
<a href="admindash.html">Departments</a>
<a href="#">Users</a>
<a href="#">Analytics</a>
</div>

<div class="logout">
Admin User<br>
Logout
</div>

</div>

<!-- Main -->

<div class="main">

<div class="header">Admin Dashboard</div>

<div class="cards">

<div class="card">
<h3>Total Complaints</h3>
<div class="number" id="complaints">0</div>
</div>

<div class="card">
<h3>Pending</h3>
<div class="number" id="pending">0</div>
</div>

<div class="card">
<h3>Resolved</h3>
<div class="number" id="resolved">0</div>
</div>

<div class="card">
<h3>Critical</h3>
<div class="number" id="critical">0</div>
</div>

</div>

<div class="charts">

<div class="chart-box">
<h3>Department Workload</h3>
<canvas id="barChart"></canvas>
</div>

<div class="chart-box">
<h3>Status Distribution</h3>
<canvas id="pieChart"></canvas>
</div>

</div>

</div>

<script>

/* Counter Animation */

function animateValue(id,end){

let obj=document.getElementById(id)
let start=0
let duration=800
let step=Math.ceil(end/(duration/20))

let timer=setInterval(()=>{

start+=step
if(start>=end){
start=end
clearInterval(timer)
}

obj.textContent=start

},20)

}

animateValue("complaints",5)
animateValue("pending",4)
animateValue("resolved",1)
animateValue("critical",2)

/* Bar Chart */

new Chart(document.getElementById("barChart"),{

type:"bar",

data:{
labels:["Water","Electricity","Sanitation","Property Tax","Roads"],
datasets:[{
label:"Complaints",
data:[1,1,1,1,1],
backgroundColor:"#f59e0b"
}]
},

options:{
responsive:true,
plugins:{
legend:{display:false}
}
}

})

/* Pie Chart */

new Chart(document.getElementById("pieChart"),{

type:"doughnut",

data:{
labels:["Submitted","Under Review","In Progress","Completed"],
datasets:[{
data:[1,2,1,1],
backgroundColor:[
"#3b82f6",
"#f59e0b",
"#8b5cf6",
"#10b981"
]
}]
},

options:{
responsive:true
}

})

</script>

</body>
</html>
